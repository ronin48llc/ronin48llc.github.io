<style>
  .linktree-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 480px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  .linktree-wrapper .linktree-avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1rem;
  }

  .linktree-wrapper .linktree-name {
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .linktree-wrapper .linktree-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
  }

  .linktree-wrapper .linktree-btn {
    display: block;
    width: 100%;
    padding: 0.85rem 1rem;
    text-align: center;
    text-decoration: none;
    border: 2px solid currentColor;
    border-radius: 6px;
    font-size: 1rem;
    color: inherit;
    background: transparent;
    box-sizing: border-box;
    transition: opacity 0.15s ease;
  }

  .linktree-wrapper .linktree-btn:hover {
    opacity: 0.7;
  }

  @media (max-width: 320px) {
    .linktree-wrapper {
      padding: 1rem 0.5rem;
    }

    .linktree-wrapper .linktree-avatar {
      width: 90px;
      height: 90px;
    }

    .linktree-wrapper .linktree-name {
      font-size: 1.2rem;
    }

    .linktree-wrapper .linktree-btn {
      padding: 0.7rem 0.75rem;
      font-size: 0.9rem;
    }
  }
</style>

<div class="linktree-wrapper">

    <a href="https://example.com/link1" target="_blank" rel="noopener" class="linktree-btn">Link Placeholder 1</a>
