---
layout: default
title: Videos
permalink: /videos
---

<style>
  .videos-wrapper {
    max-width: 800px;
    margin: 0 auto;
  }

  .videos-wrapper h2 {
    margin-bottom: 1rem;
  }

  .videos-wrapper .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .videos-wrapper .video-card {
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .videos-wrapper .video-card img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border: 1px solid currentColor;
  }

  .videos-wrapper .video-card .video-title {
    margin-top: 0.5rem;
    font-size: 0.95rem;
    line-height: 1.3;
  }

  .videos-wrapper .video-card .video-date {
    font-size: 0.8rem;
    opacity: 0.7;
    margin-top: 0.25rem;
  }

  .videos-wrapper .video-card:hover img {
    opacity: 0.8;
  }

  .videos-wrapper .videos-loading,
  .videos-wrapper .videos-error {
    padding: 2rem 0;
  }

  .videos-wrapper .channel-link {
    margin-top: 2rem;
    display: block;
  }

  @media (max-width: 320px) {
    .videos-wrapper .video-grid {
      grid-template-columns: 1fr;
      gap: 1rem;
    }
  }
</style>

<div class="videos-wrapper">
  <div id="videos-content" class="videos-loading">Loading videos...</div>
  <a href="https://www.youtube.com/@patricklovesaws" target="_blank" rel="noopener" class="channel-link">
    View all videos on YouTube →
  </a>
</div>

<script>
(function () {
  "use strict";

  // YouTube channel ID — find yours at YouTube Studio > Settings > Advanced Settings
  // Replace this with your actual channel ID
  var CHANNEL_ID = "REPLACE_WITH_YOUR_CHANNEL_ID";
  var container = document.getElementById("videos-content");

  // Use a public RSS-to-JSON proxy to avoid CORS issues on static sites
  var feedUrl = "https://www.youtube.com/feeds/videos.xml?channel_id=" + CHANNEL_ID;
  var proxyUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feedUrl);

  fetch(proxyUrl)
    .then(function (res) {
      if (!res.ok) throw new Error("Failed to fetch");
      return res.json();
    })
    .then(function (data) {
      if (!data.items || data.items.length === 0) {
        container.innerHTML = "<p>No videos found. Check back soon!</p>";
        return;
      }

      var html = '<div class="video-grid">';
      data.items.forEach(function (item) {
        // Extract video ID from the link
        var videoId = "";
        var match = item.link && item.link.match(/[?&]v=([^&]+)/);
        if (match) videoId = match[1];

        var thumbnail = item.thumbnail || "https://img.youtube.com/vi/" + videoId + "/mqdefault.jpg";
        var title = item.title || "Untitled";
        var pubDate = item.pubDate ? new Date(item.pubDate).toLocaleDateString() : "";

        html += '<a href="' + item.link + '" target="_blank" rel="noopener" class="video-card">';
        html += '<img src="' + thumbnail + '" alt="' + title.replace(/"/g, "&quot;") + '" loading="lazy">';
        html += '<div class="video-title">' + title + '</div>';
        if (pubDate) html += '<div class="video-date">' + pubDate + '</div>';
        html += '</a>';
      });
      html += '</div>';
      container.innerHTML = html;
    })
    .catch(function () {
      container.innerHTML = '<p class="videos-error">Could not load videos. <a href="https://www.youtube.com/@patricklovesaws" target="_blank" rel="noopener">Visit the channel directly</a>.</p>';
    });
})();
</script>
