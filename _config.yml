title: "Ronin 48"
description: Tech blog by Ronin48
baseurl: ""
url: "https://ronin48llc.github.io"

remote_theme: riggraz/no-style-please

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

theme_config:
  mode: "auto"
  show_description: true
