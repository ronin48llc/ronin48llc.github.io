title: "Ronin 48"
description: "Cloud, contact centers, and building things that work — thoughts from 25 years in the field"
baseurl: ""
url: "https://ronin48llc.github.io"

remote_theme: riggraz/no-style-please

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

theme_config:
  mode: "auto"
  show_description: true
  show_tags: true
  date_format: "%B %-d, %Y"
