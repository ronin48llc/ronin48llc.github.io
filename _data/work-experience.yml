- title: CTO — CloudHesive, LLC
  period: September 2014 – March 2026
  location: Fort Lauderdale, FL / Atlanta, GA (Remote)
  bullets:
    - Established AWS partnership and progressed to Premier Tier partner with 17 programs and competencies including multi-year renewals in the AWS MSP Program.
    - Developed and grew product/development, consulting/professional services, and managed services teams including budgeting, forecasting, hiring, training, promotion and retention.
    - Developed a standard set of measures against these teams to use in board level reports.
    - Developed Product and Service offerings in Managed Services, Contact Center, End User Computing, Media, Compliance and Research Segments.
    - Accepted as the first employee into the AWS Ambassador Program with multi-year renewals and recognition in certifications and evangelization of AWS, including contribution to certification exams as a subject matter expert.
    - Led the process of demonstrating competency around workload migration with AWS, resulting in recognition through the AWS Migration Competency and eligibility for the Migration Acceleration Program (MAP).
    - Leveraged MAP and MAP-aligned processes to engage with prospective customers in working sessions, demonstrating maturity levels through Migration Readiness Assessments (MRAs), opportunities for improvement, and the economics of migration and operation of workloads on AWS, including financial offset offered through MAP.
    - Worked with customers to understand their current standards, desired objectives and current footing on the public cloud to design, build and operate to-be approaches from migration preparation through Landing Zone/Control Tower creation to assessment, planning and migration of individual workloads.
    - Migrated workloads for customers using the AWS prioritization and migration strategy (7Rs).
    - Performed assessments for customers considering migrating to AWS, Microsoft Azure and IBM Cloud, or customers already deployed but lacking staffing or expertise to manage. Assessments aligned to AWS Well Architected Framework.
    - Developed Encryption as a Service (EaaS) based on global deployment of Vormetric DSM appliances on AWS as a migration path from Cloudera Gazzang.
    - Developed Managed Security Service (MSS) based on EaaS, Trend Micro Deep Security and Alert Logic, and Managed Service Provider (MSP) service based on industry expertise, automation and tools such as Datadog and Sumo Logic.
    - Principal during SOC and PCI Audits validating MSS and MSP Services.
    - Responsible for Product and Development of SaaS offerings (ConnectPath, Centricity, Dextr), managing the backlog, testing and release of new features.
    - These products, spanning 10 years, evolved from Java/MySQL to Serverless.
    - Products integrated with AWS Contact Center, Analytics and Generative AI services such as Connect, Lex, Bedrock and Q, based on customer feedback implementing these services since their launch.
    - Projects included competitive migrations to Amazon Connect, migration of IVRs from third parties including VoiceXML-based IVRs to Lex/Lambda/DynamoDB, and creation of data lakes and analytics based on AWS native services such as Lake Formation and QuickSight.
    - Bedrock was used to augment SaaS applications' capabilities using third party and first party LLMs; Q was used to support internal corporate initiatives, customer initiatives, and optimize development and operations teams' capabilities.
    - Implementation of automation processes to support managed services customers, specifically around bootstrapping and autoscaling scripts including deployment pipelines. Autoscaling scripts specialized in launching and configuration of Windows Application Servers and Citrix Worker Servers.
    - Implementation of hardening process to take off-the-shelf AMIs and apply CIS recommendations, producing new encrypted AMIs. Leveraged Ansible and Packer.
    - Enhancements and bug fixes for customers' existing deployment pipelines. Leveraged Jenkins, GitHub, Gradle, NPM, Artifactory, Chef, Docker, CloudFormation, ECS and ECR.
    - Deployment of stand-alone security and operational control planes with supporting systems.
    - Implementation of machine learning proof of concept to eliminate extraneous operational events.
